version: v2beta1

vars:
  METERING_NAMESPACE: platform
  DEV_IMAGE: ghcr.io/agynio/devcontainer-go:1
  E2E_IMAGE: ghcr.io/agynio/devcontainer-go:1

functions:
  disable_argocd_sync: |-
    if kubectl get application metering -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for metering..."
      kubectl patch application metering -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'metering' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application metering -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for metering..."
      kubectl patch application metering -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'metering' not found in argocd namespace."
    fi
  wait_for_metering_deployment: |-
    echo "Waiting for metering deployment to exist..."
    ELAPSED=0
    while ! kubectl get deployment metering -n ${METERING_NAMESPACE} >/dev/null 2>&1; do
      sleep 5
      ELAPSED=$((ELAPSED + 5))
      if [ "$ELAPSED" -ge 300 ]; then
        echo "ERROR: metering deployment not found after 300s"
        exit 1
      fi
      echo "Still waiting for metering deployment... (${ELAPSED}s)"
    done
    echo "Metering deployment found."
  patch_deployment: |-
    echo "Patching metering deployment for DevSpace..."
    kubectl patch deployment metering -n ${METERING_NAMESPACE} --type strategic --patch "$(cat <<'EOF'
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          initContainers: []
          volumes:
            - name: data
              emptyDir: {}
          containers:
            - name: metering
              image: ghcr.io/agynio/devcontainer-go:1 # keep in sync with DEV_IMAGE
              workingDir: /opt/app/data
              command:
                - sh
                - -c
                - |
                  set -eux
                  elapsed=0
                  while [ ! -f /opt/app/data/go.mod ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                    [ "$elapsed" -ge 300 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                  done
                  echo "Files synced, starting buf generate..."
                  ls -la /opt/app/data/
                  buf generate https://github.com/agynio/api.git#commit=30f3fe5782173a5095f563d57abaf8fc37e6b6b0 \
                    --include-imports \
                    --path proto/agynio/api/metering/v1
                  echo "buf generate complete, starting go run..."
                  exec go run ./cmd/metering
              volumeMounts:
                - name: data
                  mountPath: /opt/app/data
              livenessProbe: null
              readinessProbe: null
              startupProbe: null
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
    EOF
    )"
  wait_for_metering: |-
    echo "Waiting for metering deployment to roll out..."
    kubectl rollout status deployment/metering \
      -n ${METERING_NAMESPACE} --timeout=120s

    echo "Waiting for metering source sync and process start..."
    ELAPSED=0
    LABEL_SELECTOR="app.kubernetes.io/instance=metering"
    until kubectl logs -n ${METERING_NAMESPACE} -l "${LABEL_SELECTOR}" --tail=200 2>/dev/null | \
      grep -q "metering: ready"; do
      sleep 5
      ELAPSED=$((ELAPSED + 5))
      if [ "$ELAPSED" -ge 600 ]; then
        echo "ERROR: metering ready log not found within 600s" >&2
        echo "Diagnostic pod list:" >&2
        kubectl get pods -n ${METERING_NAMESPACE} -l "${LABEL_SELECTOR}" -o wide >&2 || true
        echo "Diagnostic logs (tail 200):" >&2
        kubectl logs -n ${METERING_NAMESPACE} -l "${LABEL_SELECTOR}" --tail=200 >&2 || true
        echo "Diagnostic previous logs (tail 200):" >&2
        kubectl logs -n ${METERING_NAMESPACE} -l "${LABEL_SELECTOR}" --tail=200 --previous >&2 || true
        echo "Diagnostic pod describe:" >&2
        kubectl describe pods -n ${METERING_NAMESPACE} -l "${LABEL_SELECTOR}" >&2 || true
        exit 1
      fi
      echo "  still waiting... (${ELAPSED}s)"
    done
    echo "Metering is running from source."

deployments:
  metering-db:
    namespace: ${METERING_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - name: metering-db
            image: postgres:16.6-alpine
            env:
              - name: POSTGRES_DB
                value: metering
              - name: POSTGRES_USER
                value: metering
              - name: POSTGRES_PASSWORD
                value: metering
              - name: PGDATA
                value: /var/lib/postgresql/data/pgdata
            ports:
              - name: postgres
                containerPort: 5432
            readinessProbe:
              exec:
                command:
                  - pg_isready
                  - -U
                  - metering
                  - -d
                  - metering
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 5
              failureThreshold: 6
            livenessProbe:
              exec:
                command:
                  - pg_isready
                  - -U
                  - metering
                  - -d
                  - metering
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
            volumeMounts:
              - containerPath: /var/lib/postgresql/data
                volume:
                  name: data
        service:
          ports:
            - name: postgres
              port: 5432
              containerPort: 5432
        volumes:
          - name: data
            emptyDir: {}
  metering:
    namespace: ${METERING_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        labels:
          app.kubernetes.io/instance: metering
        containers:
          - name: metering
            image: ghcr.io/agynio/metering:latest
            env:
              - name: GRPC_ADDRESS
                value: ":50051"
              - name: DATABASE_URL
                value: "postgresql://metering:metering@metering-db:5432/metering?sslmode=disable"
              - name: LOG_LEVEL
                value: "info"
            ports:
              - name: grpc
                containerPort: 50051
        service:
          ports:
            - name: grpc
              port: 50051
              containerPort: 50051
  e2e-runner:
    namespace: ${METERING_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        securityContext:
          runAsUser: 1000
          fsGroup: 1000
        containers:
          - image: ${E2E_IMAGE}
            env:
              - name: METERING_ADDRESS
                value: "metering:50051"
            volumeMounts:
              - containerPath: /opt/app/data
                volume:
                  name: data
        volumes:
          - name: data
            emptyDir: {}
        labels:
          app.kubernetes.io/name: metering-e2e

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e -n ${DEVSPACE_NAMESPACE} $@
  deploy: |-
    devspace run-pipeline deploy -n ${DEVSPACE_NAMESPACE} $@
  restore-argocd: |-
    devspace run-pipeline restore-argocd -n ${DEVSPACE_NAMESPACE} $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      trap 'echo "Restoring ArgoCD sync..."; restore_argocd_sync' EXIT
      disable_argocd_sync
      if ! kubectl get deployment metering -n ${METERING_NAMESPACE} >/dev/null 2>&1; then
        echo "Metering deployment missing; creating helm deployments."
        create_deployments metering-db metering
        kubectl rollout status deployment/metering-db -n ${METERING_NAMESPACE} --timeout=120s
      fi
      wait_for_metering_deployment
      patch_deployment
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace metering
      else
        start_dev --disable-pod-replace metering
        sleep 10
        echo "Dev environment ready. Stopping dev session."
        stop_dev metering
      fi

  deploy:
    run: |-
      disable_argocd_sync
      if ! kubectl get deployment metering -n ${METERING_NAMESPACE} >/dev/null 2>&1; then
        echo "Metering deployment missing; creating helm deployments."
        create_deployments metering-db metering
        kubectl rollout status deployment/metering-db -n ${METERING_NAMESPACE} --timeout=120s
      fi
      wait_for_metering_deployment
      patch_deployment
      start_dev --disable-pod-replace metering-deploy
      wait_for_metering
      echo "Deploy complete. Metering is running from source."

  test-e2e:
    run: |-
      create_deployments e2e-runner
      start_dev e2e-runner
      echo "Sync complete. Running e2e tests..."
      exec_container \
        --label-selector "app.kubernetes.io/name=metering-e2e" \
        -n ${METERING_NAMESPACE} \
        -- bash -c 'cd /opt/app/data && buf generate https://github.com/agynio/api.git#commit=30f3fe5782173a5095f563d57abaf8fc37e6b6b0 --include-imports --path proto/agynio/api/metering/v1 && go test -v -count=1 -tags e2e ./test/e2e/'
      EXIT_CODE=$?
      stop_dev e2e-runner
      purge_deployments e2e-runner
      exit $EXIT_CODE

  restore-argocd:
    run: |-
      restore_argocd_sync

dev:
  metering:
    namespace: ${METERING_NAMESPACE}
    labelSelector:
      app.kubernetes.io/instance: metering
    containers:
      metering:
        container: metering
        sync:
          - path: ./:/opt/app/data
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
        logs:
          enabled: true
          lastLines: 200

  e2e-runner:
    namespace: ${METERING_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: metering-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - /.gen/
          - /tmp/

  metering-deploy:
    namespace: ${METERING_NAMESPACE}
    labelSelector:
      app.kubernetes.io/instance: metering
    containers:
      metering:
        container: metering
        sync:
          - path: ./:/opt/app/data
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
