name: E2E

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision cluster
        uses: agynio/bootstrap/.github/actions/provision@main

      - name: Setup DevSpace
        uses: agynio/e2e/.github/actions/setup-devspace@main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: 1.66.0

      - name: Prepare generated sources
        run: |
          buf generate buf.build/agynio/api \
            --include-imports \
            --path agynio/api/metering/v1

      - name: Build source binary for DevSpace
        run: |
          go mod download
          mkdir -p dist
          CGO_ENABLED=0 go build -o dist/metering-devspace ./cmd/metering

      - name: Deploy metering from source
        run: devspace dev

      - name: Capture metering diagnostics
        if: failure()
        run: devspace run diagnostics

      - name: Run E2E tests
        uses: agynio/e2e/.github/actions/run-tests@main
        with:
          service: metering

      - name: Restore ArgoCD sync
        if: always()
        run: devspace run restore-argocd
